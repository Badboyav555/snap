<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SnapGrowth - Processing</title>
    <style>
        /* RESET & BASE */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; -webkit-tap-highlight-color: transparent; }
        
        :root {
            --primary: #FFFC00; /* Snap Yellow */
            --dark: #1a1a1a;
            --gray: #f4f4f4;
            --text-gray: #666;
            --blue: #0088ff;
        }

        body {
            background-color: #FAFAFA;
            color: var(--dark);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* HEADER */
        header {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px 20px;
            background: #fff;
            box-shadow: 0 1px 0 rgba(0,0,0,0.05);
            z-index: 10;
        }

        .brand {
            font-weight: 800;
            font-size: 18px;
            display: flex;
            align-items: center;
            gap: 8px;
            letter-spacing: -0.5px;
        }

        .brand span { color: var(--blue); }

        /* MAIN CONTAINER */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            text-align: center;
        }

        /* CARD DESIGN */
        .message-card {
            background: #fff;
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.06);
            max-width: 380px;
            width: 100%;
            position: relative;
            border-top: 4px solid var(--primary);
        }

        /* ICON ANIMATION */
        .icon-wrapper {
            margin-bottom: 24px;
            display: flex;
            justify-content: center;
        }

        .loading-icon {
            width: 48px;
            height: 48px;
            color: var(--blue);
            animation: rotate 2s linear infinite;
        }

        @keyframes rotate {
            100% { transform: rotate(360deg); }
        }

        /* TYPOGRAPHY */
        .status-title {
            font-size: 20px;
            font-weight: 700;
            color: var(--dark);
            margin-bottom: 12px;
            letter-spacing: -0.3px;
        }

        .status-desc {
            font-size: 15px;
            color: var(--text-gray);
            line-height: 1.6;
        }

        /* PROGRESS BAR DECORATION */
        .progress-container {
            margin-top: 25px;
            width: 100%;
            height: 4px;
            background: var(--gray);
            border-radius: 2px;
            overflow: hidden;
            position: relative;
        }

        .progress-bar {
            height: 100%;
            background: var(--primary);
            width: 60%; /* Static for visual only */
            position: absolute;
            left: -100%;
            animation: loading-slide 2s infinite ease-in-out;
        }

        @keyframes loading-slide {
            0% { left: -100%; width: 100%; }
            50% { left: 100%; width: 10%; }
            100% { left: 100%; width: 0%; }
        }

        /* FOOTER */
        footer {
            text-align: center;
            padding: 20px;
            font-size: 11px;
            color: #aaa;
            background: #fff;
            border-top: 1px solid #f0f0f0;
            margin-bottom: 30px; /* Space for safety banner */
        }

        /* SAFETY BANNER */
        .demo-banner {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: rgba(0,0,0,0.9);
            color: #fff;
            text-align: center;
            padding: 8px;
            font-size: 11px;
            z-index: 1000;
        }

    </style>
</head>
<body>

    <!-- Header -->
    <header>
        <div class="brand">
            <!-- Ghost Icon -->
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 2C6.48 2 2 6.48 2 12C2 17.52 6.48 22 12 22C17.52 22 22 17.52 22 12C22 6.48 17.52 2 12 2ZM12 4C14.21 4 16 5.79 16 8C16 10.21 14.21 12 12 12C9.79 12 8 10.21 8 8C8 5.79 9.79 4 12 4ZM12 20C9.5 20 7.23 18.96 5.63 17.25C6.54 15.73 8.25 14.5 12 14.5C15.75 14.5 17.46 15.73 18.37 17.25C16.77 18.96 14.5 20 12 20Z" fill="#000"/>
            </svg>
            Snap<span>Growth</span>
        </div>
    </header>

    <!-- Main Content -->
    <main>
        <div class="message-card">
            <div class="icon-wrapper">
                <!-- Circular Loading/Time Icon -->
                <svg class="loading-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/>
                </svg>
            </div>

            <h1 class="status-title">Update In Progress</h1>
            
            <p class="status-desc">
                Your Snap Score and your friend's score will be updated within 24 hours.
            </p>

            <!-- Decorative Progress Bar -->
            <div class="progress-container">
                <div class="progress-bar"></div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer>
        <p>&copy; 2024 SnapGrowth Analytics Tool. All rights reserved.</p>
    </footer>

    

</body>
</html>
